kind = "web"
previewPath = "/"
title = "LinguaPlay"
version = "1.0.0"
id = "artifacts/linguaplay"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20404

[services.development]
run = "pnpm --filter @workspace/linguaplay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/linguaplay", "run", "build" ]
publicDir = "artifacts/linguaplay/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20404"
BASE_PATH = "/"
